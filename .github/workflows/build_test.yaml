name: build test

on:
  workflow_dispatch:
  pull_request:

jobs:
  build:
    name: build (${{ matrix.ros_distro }})
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - ros_distro: humble
            runs-on: ubuntu-22.04
            container_image: osrf/ros:humble-desktop-jammy
          - ros_distro: jazzy
            runs-on: ubuntu-24.04
            container_image: osrf/ros:jazzy-desktop-noble
    container:
      image: ${{ matrix.container_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies of choreonoid
        run: |
          apt-get update && \
          apt-get -y upgrade && \
          apt-get -y install \
          build-essential \
          cmake-curses-gui \
          libboost-dev \
          libboost-system-dev \
          libboost-program-options-dev \
          libboost-iostreams-dev \
          libeigen3-dev \
          uuid-dev \
          libxfixes-dev \
          libyaml-dev \
          libfmt-dev \
          gettext \
          zlib1g-dev \
          libjpeg-dev \
          libpng-dev \
          libfreetype-dev \
          qtbase5-dev \
          libqt5x11extras5-dev \
          libqt5svg5-dev \
          qttranslations5-l10n \
          python3-dev \
          python3-numpy \
          libassimp-dev \
          libode-dev \
          libfcl-dev \
          libpulse-dev \
          libsndfile1-dev \
          libgstreamer1.0-dev \
          libgstreamer-plugins-base1.0-dev \
          libzip-dev \
          python3-colcon-coveragepy-result \
          python3-colcon-lcov-result

      - name: Run build test
        uses: ros-tooling/action-ros-ci@v0.3
        with:
          target-ros2-distro: ${{ matrix.ros_distro }}
          vcs-repo-file-url: dependency.repos
          extra-cmake-args: -DWITH_INTEGRATION_TEST=ON
          # If possible, pin the repository in the workflow to a specific commit to avoid
          # changes in colcon-mixin-repository from breaking your tests.
